services:
  geoserver-mcp:
    build:
      context: .
    image: geoserver-mcp:dev
    environment:
      GEOSERVER_MCP_TRANSPORT: streamable-http
      GEOSERVER_MCP_HOST: 0.0.0.0
      GEOSERVER_MCP_PORT: "8000"
    ports:
      - "127.0.0.1:8000:8000"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

  geoserver-fixture:
    image: docker.osgeo.org/geoserver:2.28.2
    profiles:
      - fixture
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      SKIP_DEMO_DATA: "false"
    read_only: false
