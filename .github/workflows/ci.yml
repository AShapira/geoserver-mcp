name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "0.11.17"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run tests
        run: uv run pytest

      - name: Run Ruff lint
        run: uv run ruff check --no-cache .

      - name: Run Ruff format check
        run: uv run ruff format --check --no-cache .

      - name: Build Docker image
        run: docker build --tag geoserver-mcp:ci .

      - name: Smoke-test Docker entrypoint
        run: docker run --rm geoserver-mcp:ci geoserver-mcp --version

      - name: Smoke-test Docker startup
        run: |
          container_id="$(docker run -d --rm geoserver-mcp:ci)"
          cleanup() {
            docker stop "$container_id" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          sleep 5
          docker logs "$container_id"
          docker ps --no-trunc --filter "id=$container_id" --filter "status=running" --format "{{.ID}}" | grep -q "$container_id"
